  - discriminant: prose
    value:
      md: 随着SAREC继续访谈开发商、建筑师、施工企业、贷款机构和物业运营方，数据库还将补充土地筛选指标、真实成本、审批与建设周期、租金结构、融资结构、资本回报、风险事件和退出方式。这些持续积累的数据，构成《SAREC美国房地产开发模式数据库》的第一部分。
  - discriminant: sectionHeading
    value:
      text: 十六、结论：美国小型房地产开发正在从项目制走向产品制
  - discriminant: prose
    value:
      md: |-
        过去，人们通常把每一栋房屋看成一个独立项目。但在土地、人工、融资和审批成本不断提高的环境下，单纯依靠项目经理个人经验，已经越来越难稳定控制利润。

        未来真正具有规模能力的小型开发商，会越来越像制造企业：有明确的原材料标准（旧独栋和地块筛选模型）、固定产品型号（4单元型与5单元型）、标准图纸和材料、稳定施工体系、供应链、质量控制、项目数据和持续迭代能力。

        主屋扩建加ADU，只是这种转变的一个案例。这套模式最值得研究的地方，不是"一个后院能不能再建一套房"，而是：
  - discriminant: pullQuote
    value:
      text: 当一项普通房地产开发行为被标准化、产品化、流程化以后，它能否从一次性工程，升级为可以规模复制的企业能力？
  - discriminant: prose
    value:
      md: 这可能正是美国中小型房地产开发下一阶段最重要的变化之一。
  - discriminant: sectionHeading
    value:
      text: 系列预告与工具
  - discriminant: prose
    value:
      md: |-
        《美国房地产开发模式》系列将逐一拆解一线的十几种真实打法：独栋拆除重建、SB 9地块分割、车库改建ADU、小型公寓翻新、Motel改公寓、土地Entitlement转售、Build-to-Rent小型社区……每一种都过一遍「开发商六重收益」模型与「SAREC压力测试」，逐条沉淀进《SAREC美国房地产开发模式数据库》。宏观背景可参阅SAREC此前发布的[《美国房地产大重置（2026年中期）》](https://sinoamericanrec.org/zh/research/us-housing-great-reset-2026)。

        **本篇工具：** 本文测算出自《SAREC模式01财务测算表》。面向读者的精简版（输入收购价、面积、租金，自动计算NOI、估值、贷款额度与盈亏平衡租金）将随系列开放，留邮箱即可预约：info@sinoamericanrec.org（注明"模式01"）。
  - discriminant: sectionHeading
    value:
      text: 研究口径
  - discriminant: prose
    value:
      md: 本文中的政策信息依据截至2026年7月可获得的加州HCD、核桃市及Fannie
        Mae公开资料。"平均4.5个模块、800—1,000平方尺产品参数、约10个月整周期、买入约$600/尺、全建设成本约$240/尺、完工$600—650/尺、自有施工及中国采购体系"来自SAREC对具体开发业务的访谈归纳，为从业者经验值；文中面积假设、运营费用率、资本化率、贷款条件及由此推出的利润与回报数据属于SAREC模式01基准测算模型，用于检验商业逻辑，不代表任何具体项目的实际财务业绩。经复算，受访者自述的建安单价（乘新增面积）与全成本区间（除完工面积）相互吻合；实际项目数据将随数据库逐步回填。
faq:
  - question: 什么是主屋扩建加ADU开发模式？
    answer: 在现有独立住宅地块上，对主屋进行扩建，同时建设一个附属住宅单元（ADU），从而增加建筑面积、居住空间和出租能力的开发方式。
  - question: ADU最多只能建1,000平方尺吗？
    answer: 不同城市规则不同。加州地方标准必须至少允许850平方尺，超过一间卧室的ADU至少允许1,000平方尺；部分城市允许更大。核桃市现行口径为"1,000平方尺或主屋面积50%取小"，且不得低于州法最低保障。
  - question: 主屋扩建受ADU的1,000平方尺限制吗？
    answer: 不受。主屋扩建按当地分区、覆盖率、退距、高度、停车、消防、结构及建筑审批要求单独确定。ADU面积上限不是整个项目的扩建上限。
  - question: 一栋独立屋可以形成4—5个Unit吗？
    answer: 在产品设计和出租运营层面，可以形成多个相对独立的居住模块。但这些模块是否都属于法定独立住宅单元，必须以当地批准图纸和许可证为准；常规住宅融资口径下，"一户＋一个ADU"仍按一户住宅认定。
  - question: 为什么项目组合平均是4.5个Unit？
    answer: 部分项目采用4单元产品，部分采用5单元产品。两类数量大致相当时，组合平均即为4.5个。
  - question: 审批真的只需要3—4个月吗？
    answer: 3—4个月是SAREC获得的特定项目方经验，不是政府保证。加州对完整ADU申请设有60天审查要求，但主屋扩建加ADU的整个项目通常需要更长时间，取决于城市、地块、申请完整度和修改次数。
  - question: 这种模式的基准回报是多少？
    answer: 按SAREC基准模型：平均总投入约153.4万美元（约$370/完工尺）。出售路径按$600/尺测算，扣除出售成本后税前开发净利约80.7万美元，税前成本利润率约52%；即使售价降到$500/尺，开发毛价差仍约54万美元。持有路径按5.0%资本化率情景估值约211.4万美元，成本收益率约6.9%；按DSCR
      1.25情景测算的再融资额约105.9万美元，可回收约七成资本，重贷后年税前现金流约2.1万美元。以上为研究测算假设，不是任何项目的收益承诺；实际结果取决于买入价格纪律、真实成本、租金、利率与估值方式。
  - question: 中国采购材料一定更便宜吗？
    answer: 不一定。必须综合计算认证、运输、关税、仓储、损耗、补货和安装成本。只有产品规格稳定、采购量足够时，跨境供应链才更可能形成综合成本优势。
