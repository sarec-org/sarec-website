        按平均总投入153.4万美元测算，这套模式的安全边际有两个刻度：

        **出售路径的盈亏平衡售价约$370/完工尺**——只要完工后每尺卖得过$370，项目就不亏本，而市场锚在$600—650。**持有路径的盈亏平衡月租约每模块$2,050**（资本化率5.0%时；升到5.5%约$2,250）——而产品的市场租金锚在$2,800—2,850。

        开发价差对租金和资本化率的敏感性（收入法稳定价值−总投入，单位：千美元）：
