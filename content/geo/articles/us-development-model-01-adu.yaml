  - discriminant: sectionHeading
    value:
      text: 2. 开发商的匡算逻辑：三个价格锚
  - discriminant: prose
    value:
      md: |-
        在进入财务表之前，先还原这门生意在收购现场是怎么算账的。它建立在三个价格锚上：

        **买入锚：老房约$600/尺。** 注意，一栋老房子本身并不值$600/尺——只有新房才值$600—650。老房能按$600/尺成交，是因为地大：买家付的实质是土地和它的开发潜力。这也解释了为什么这套模式只挑"房小地大"的标的。

        **成本锚：新增建筑面积全建设成本约$240/尺。** 其中建安约$220/尺，设计、许可、庭院及场地等约$20/尺。注意这个单价乘的是新增面积，不是完工总面积——这是实际操作中反复发生的经验值，不是理论测算。

        **卖出锚：完工按新房市价$600—650/尺。** 扩建加ADU完成后，整栋按完工面积对标新房出售或估值。

        三个锚合在一起，就是这套模式的利润引擎。用开发商最直白的话说，原有面积以外的新增建筑面积，**"土地是免费的"**。更准确地说：土地取得成本已经在收购时一次性支付，后续新增面积不再重复承担土地购买成本，其边际土地成本近似为零。所以每新增一平方尺的**开发毛价差**，约为$600−$240＝**$360**——这里的"开发毛价差"尚未扣除交易、融资、持有及税务成本，不等于项目最终净利润。4单元型新增约2,700尺，新增面积毛价差约$97万；5单元型新增约3,100尺，约$112万。这就是开发商在收购现场三分钟能算完的账，其余一切财务模型，都只是给这笔账做验证和加压。
