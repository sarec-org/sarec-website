title: 美国房地产开发模式①：一栋老旧独立屋，如何被重构为4—5个标准化现金流单元
description: 收购老旧独栋、扩建主屋并加建ADU，形成4—5个标准化出租模块。SAREC拆解这套南加州开发模式的三个价格锚、成本结构、出售与持有两条路径及重贷约束。
