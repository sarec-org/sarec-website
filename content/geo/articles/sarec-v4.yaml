  - discriminant: prose
    value:
      md: >-
        2026 年 2 月,洛杉矶市中心。泛海广场——那三栋被涂鸦覆盖了至少 25 层的"Graffiti Towers"——在破产法院程序中等来了约
        4.7 亿美元的拟议收购方案。投入超过 12 亿美元,拟议处置价 4.7
        亿(以破产法院最终文件为准)。这件事我们在《中国资本在美国搞房地产开发的 10 大致命陷阱》里已经完整复盘过。


        把镜头拉远一点看另一条线:2024 年 6 月,黑石(Blackstone)完成对 AIR Communities 的私有化,约 100
        亿美元拿下 77 处公寓社区(2024 年 4 月 8 日宣布,6 月 28
        日交割)——那笔交易发生在泛海们的黄昏期,是机构资本对美国住宅赛道投出的一张百亿级赞成票。到了 2026 年,黑石在《2026
        Investment Perspectives》里给出的逻辑依然没变,而且更硬了:多户住宅新开工较峰值已降超
        60%,供给洪峰退潮,租赁需求的结构性支撑还在。


        一边是葬礼,一边是进场。
  - discriminant: pullQuote
    value:
      text: 周期没有杀死美国房地产。周期只是换了付钱的人。
  - discriminant: prose
    value:
      md: |-
        这句判断,我在 2008 年就见过它的上一次应验。雷曼兄弟倒掉那天,我是从新闻里知道的。晚上回到家,家人都睡了,我一个人在客厅来回踱步,越走越清醒:关键时刻到了,谁手里握着现金,谁就等来了扫货的机会。第二天我去找合伙人高总,她当时还不到三十岁,作风雷厉风行,把市场掰开分析完,四个字:说干就干。2009 年启动赴美,2011 年拿到绿卡,2012 年在美国连买三套房——那个价格,今天想起来还是便宜得不像话。后来的十年牛市,把那批敢在葬礼上出价的人,挨个报答了一遍。

        这篇文章回答四个问题:2008 年以来美国房地产走了一条什么路?2020-2024 为什么暴涨?2024 年秋天之后为什么转跌、至今不止?接下来会怎么走——以及,中国资本该用什么姿势面对这轮周期。

        和商会所有研究一样:每个判断都有数据,每个数据都有出处。
  - discriminant: sectionHeading
    value:
      text: 一、先看三个数字,钉死 2026 年年中的现状
  - discriminant: prose
    value:
      md: >-
        **+0.8% 对 +3.8%。** 截至 2026 年 4 月,S&P Cotality Case-Shiller 全国房价指数同比上涨
        0.8%,而同期美国通胀 3.8%。换算过来:扣除通胀的美国房价已经连续 11
        个月下跌。名义价格的"横盘"是一层遮羞布,真实购买力口径下,美国房产的财富效应正在被持续侵蚀。


        **+6.5% 对 −9.0%。** 同一时点,芝加哥房价同比涨 6.5%,领跑 20 大都会区;佛罗里达 Cape Coral-Fort
        Myers 的中位售价同比跌 9.0%(ATTOM,2026Q1)。全美 53 个最大都会区,28
        个在跌——佛州、加州、德州的主要城市全部在列;而整个锈带在涨。谁还在用"全美房价"做投资叙事,谁的尽调就不及格。


        **−15.4%。** 2026 年 6 月中旬发布的数据显示,美国住宅新开工(5 月读数)环比暴跌 15.4%;6 月 24
        日发布的新房销售(5 月读数)再降 7.3%,月底待售新房约 49.6 万套,按当前销售速度相当于 10.3 个月供应量——2009
        年以来最高。建商在用脚投票,主动收缩产能;历史经验里,这通常是筑底的前奏,虽然离底还有距离。
